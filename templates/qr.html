<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Codigo QR - Subir Archivos</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px}
.qr-container{background:white;padding:40px;border-radius:20px;box-shadow:0 10px 40px rgba(0,0,0,.3);text-align:center;max-width:500px;width:100%}
h1{color:#333;margin-bottom:10px;font-size:22px}
.subtitle{color:#666;margin-bottom:30px;font-size:15px}
.qr-box{background:#f9f9f9;padding:30px;border-radius:15px;margin:20px 0;border:3px dashed #667eea}
.qr-box img{max-width:100%;height:auto}
.url-box{background:#f0f0f0;padding:15px;border-radius:10px;margin-top:20px;word-break:break-all}
.url-box strong{color:#667eea;font-size:17px}
.instructions{margin-top:25px;text-align:left;background:#f8f8f8;padding:20px;border-radius:10px;border-left:4px solid #667eea}
.instructions h3{margin-top:0;color:#667eea;font-size:16px}
.instructions ol{margin:10px 0;padding-left:20px}
.instructions li{margin:8px 0;color:#555;font-size:14px}
.icon{font-size:48px;margin-bottom:10px}
.nav-menu{display:flex;gap:10px;justify-content:center;margin-bottom:20px;flex-wrap:wrap}
.nav-btn{padding:10px 20px;background:white;color:#667eea;text-decoration:none;border-radius:10px;font-weight:500;font-size:14px;transition:all .3s;box-shadow:0 2px 10px rgba(0,0,0,.2)}
.nav-btn:hover{transform:translateY(-2px);box-shadow:0 4px 15px rgba(0,0,0,.3)}
.nav-btn.active{background:#667eea;color:white}
</style>
</head>
<body>

<div class="qr-container">
    <div class="nav-menu">
        <a href="/" class="nav-btn">Subir</a>
        <a href="/galeria" class="nav-btn">Ver Archivos</a>
        <a href="/qr" class="nav-btn active">QR</a>
    </div>

    <div class="icon">&#128241;</div>
    <h1>Escanea para Subir Archivos</h1>
    <p class="subtitle">Usa la camara de tu celular para escanear</p>

    <div class="qr-box">
        <img src="/qr-image" alt="Codigo QR">
    </div>

    <div class="url-box">
        <strong>{{ url }}</strong>
    </div>

    <div class="instructions">
        <h3>Instrucciones:</h3>
        <ol>
            <li>Abre la <strong>Camara</strong> de tu celular</li>
            <li>Apunta al codigo QR de arriba</li>
            <li>Toca la notificacion que aparece</li>
            <li>¡Listo! Ya puedes subir archivos</li>
        </ol>
    </div>
</div>

</body>
</html>
