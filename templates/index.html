<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Subir Archivos</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;display:flex;flex-direction:column;justify-content:center;align-items:center;min-height:100vh;margin:0;padding:20px}
.nav-menu{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;justify-content:center}
.nav-btn{padding:10px 20px;background:white;color:#667eea;text-decoration:none;border-radius:10px;font-weight:500;font-size:14px;transition:all .3s;box-shadow:0 2px 10px rgba(0,0,0,.2)}
.nav-btn:hover{transform:translateY(-2px);box-shadow:0 4px 15px rgba(0,0,0,.3)}
.nav-btn.active{background:#667eea;color:white}
.container{width:100%;max-width:450px;background:white;padding:30px;border-radius:20px;box-shadow:0 10px 40px rgba(0,0,0,.3);margin-top:10px}
h1{text-align:center;color:#333;margin-bottom:25px;font-size:22px}
.upload-zone{border:3px dashed #ccc;border-radius:15px;padding:30px 20px;text-align:center;cursor:pointer;transition:all .3s;margin-bottom:15px;position:relative}
.upload-zone:hover,.upload-zone.dragover{border-color:#667eea;background:#f0f3ff}
.upload-zone .icon{font-size:48px;margin-bottom:10px}
.upload-zone p{color:#666;font-size:14px}
.upload-zone p strong{color:#667eea}
#fileInput{display:none}
.file-list{max-height:200px;overflow-y:auto;margin:15px 0}
.file-item{display:flex;align-items:center;gap:10px;padding:10px;background:#f5f5f5;border-radius:8px;margin-bottom:8px;font-size:13px}
.file-item .name{flex:1;word-break:break-all;color:#333}
.file-item .size{color:#888;white-space:nowrap}
.file-item .remove{background:#f44336;color:white;border:none;border-radius:50%;width:22px;height:22px;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
#uploadBtn{width:100%;padding:15px;background:#4CAF50;color:white;border:none;border-radius:10px;cursor:pointer;font-size:16px;font-weight:500;transition:all .3s;margin-top:10px}
#uploadBtn:hover{background:#45a049;transform:translateY(-2px);box-shadow:0 5px 15px rgba(76,175,80,.4)}
#uploadBtn:disabled{background:#ccc;cursor:not-allowed;transform:none;box-shadow:none}
#uploadBtn.uploading{background:#ff9800}
.progress-container{width:100%;background:#e0e0e0;border-radius:10px;margin-top:15px;overflow:hidden;display:none}
.progress-bar{height:8px;width:0%;background:linear-gradient(90deg,#4CAF50,#8BC34A);border-radius:10px;transition:width .3s}
#status{margin-top:15px;text-align:center;font-weight:500;min-height:24px;font-size:14px}
#status.success{color:#4CAF50}
#status.error{color:#f44336}
#status.info{color:#667eea}
.preview-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:8px;margin:15px 0}
.preview-thumb{width:100%;height:80px;object-fit:cover;border-radius:8px;background:#f0f0f0}
</style>
</head>
<body>

<div class="nav-menu">
    <a href="/" class="nav-btn active">Subir</a>
    <a href="/galeria" class="nav-btn">Ver Archivos</a>
    <a href="/qr" class="nav-btn">QR</a>
</div>

<div class="container">
    <h1>Subir Archivos</h1>

    <div class="upload-zone" id="uploadZone">
        <div class="icon">&#128229;</div>
        <p>Arrastra archivos aqui o <strong>haz clic para seleccionar</strong></p>
        <p style="margin-top:8px;font-size:12px;color:#999">Maximo 5000 MB por archivo</p>
        <input type="file" id="fileInput" multiple>
    </div>

    <div class="preview-grid" id="previewGrid"></div>

    <div class="file-list" id="fileList"></div>

    <button id="uploadBtn" disabled>Subir Archivos</button>

    <div class="progress-container">
        <div class="progress-bar" id="progressBar"></div>
    </div>

    <p id="status"></p>
</div>

<script>
const fileInput = document.getElementById("fileInput");
const uploadBtn = document.getElementById("uploadBtn");
const status = document.getElementById("status");
const progressContainer = document.querySelector(".progress-container");
const progressBar = document.getElementById("progressBar");
const fileList = document.getElementById("fileList");
const previewGrid = document.getElementById("previewGrid");
const uploadZone = document.getElementById("uploadZone");

let selectedFiles = [];

uploadZone.addEventListener("click", () => fileInput.click());

uploadZone.addEventListener("dragover", (e) => {
    e.preventDefault();
    uploadZone.classList.add("dragover");
});

uploadZone.addEventListener("dragleave", () => {
    uploadZone.classList.remove("dragover");
});

uploadZone.addEventListener("drop", (e) => {
    e.preventDefault();
    uploadZone.classList.remove("dragover");
    addFiles(e.dataTransfer.files);
});

fileInput.addEventListener("change", (e) => {
    addFiles(e.target.files);
    fileInput.value = "";
});

function addFiles(newFiles) {
    for (const file of newFiles) {
        if (!selectedFiles.some(f => f.name === file.name && f.size === file.size)) {
            selectedFiles.push(file);
        }
    }
    renderFileList();
    uploadBtn.disabled = selectedFiles.length === 0;
}

function removeFile(index) {
    selectedFiles.splice(index, 1);
    renderFileList();
    uploadBtn.disabled = selectedFiles.length === 0;
}

function renderFileList() {
    fileList.innerHTML = "";
    previewGrid.innerHTML = "";

    selectedFiles.forEach((file, i) => {
        const sizeMB = (file.size / 1024 / 1024).toFixed(2);
        const div = document.createElement("div");
        div.className = "file-item";
        div.innerHTML = `
            <span class="name">${file.name}</span>
            <span class="size">${sizeMB} MB</span>
            <button class="remove" onclick="removeFile(${i})">&times;</button>
        `;
        fileList.appendChild(div);

        if (file.type.startsWith("image/")) {
            const img = document.createElement("img");
            img.className = "preview-thumb";
            img.src = URL.createObjectURL(file);
            previewGrid.appendChild(img);
        }
    });
}

uploadBtn.addEventListener("click", () => {
    if (selectedFiles.length === 0) return;

    uploadBtn.disabled = true;
    uploadBtn.classList.add("uploading");
    uploadBtn.textContent = "Subiendo...";

    const formData = new FormData();
    selectedFiles.forEach(file => formData.append("files", file));

    const xhr = new XMLHttpRequest();
    xhr.open("POST", "/upload", true);

    progressContainer.style.display = "block";
    progressBar.style.width = "0%";
    status.textContent = "";

    xhr.upload.onprogress = (e) => {
        if (e.lengthComputable) {
            const percent = (e.loaded / e.total) * 100;
            progressBar.style.width = percent + "%";
        }
    };

    xhr.onload = () => {
        uploadBtn.classList.remove("uploading");
        uploadBtn.textContent = "Subir Archivos";

        if (xhr.status === 200) {
            const resp = JSON.parse(xhr.responseText);
            let msg = resp.message;
            if (resp.errores && resp.errores.length > 0) {
                msg += " (" + resp.errores.length + " error(es))";
            }
            status.textContent = msg;
            status.className = "success";
            progressBar.style.width = "100%";

            setTimeout(() => {
                selectedFiles = [];
                renderFileList();
                uploadBtn.disabled = true;
                progressContainer.style.display = "none";
                progressBar.style.width = "0%";
                status.textContent = "";
            }, 2000);
        } else {
            status.textContent = "Error al subir los archivos";
            status.className = "error";
            progressBar.style.width = "0%";
            uploadBtn.disabled = false;
        }
    };

    xhr.onerror = () => {
        uploadBtn.classList.remove("uploading");
        uploadBtn.textContent = "Subir Archivos";
        status.textContent = "Error de conexion";
        status.className = "error";
        progressBar.style.width = "0%";
        uploadBtn.disabled = false;
    };

    xhr.send(formData);
});
</script>

</body>
</html>
